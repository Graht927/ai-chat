spring:
  application:
    name: ai-chat
  profiles:
    active: local
server:
  port: 8080

ai:
  providers:
      deepseek:
        api-key: sk-test
        base-url: https://api.deepseek.com
        default-model: deepseek-chat
        retry-policy: AI_REQUEST
        models:
          deepseek-chat:
            stream: true
            max-tokens: 1024
            reasoners: true
        endpoints:
          chat: /chat/completions
          image: /images/generations
      openai:
        api-key: sk-test
        base-url: https://api.openai.com
        default-model: gpt-3.5-turbo
        models:
          - gpt-3.5-turbo
          - gpt-3.5-turbo-0301
          - gpt-3.5-turbo-0613
          - gpt-3.5-turbo-16k
          - gpt-3.5-turbo-16k-0613
          - gpt-4
          - gpt-4-0314
          - gpt-4-0613
          - gpt-4-32k
  retry:
    config:
      policies:
        AI_REQUEST:
          max-attempts: 3
          retryable-errors:
            - TIMEOUT
            - RATE_LIMIT
          backoff:
            type: exponential
            base-delay: 500
            max-delay: 5000
            jitter: 100
    policy: default
    backoff: exponential_jitter
    max-retries: 3
    fixed-delay: 1000
    base-delay: 500
    max-delay: 5000
    jitter: 100